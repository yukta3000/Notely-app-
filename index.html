<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notely — by Yukta Taneja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8e0d5;
      --text: #1a1612;
      --muted: #8c7b6b;
      --accent: #c0392b;
      --accent-light: #fdf0ee;
      --tag-bg: #f0ebe3;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
    }
    .logo h1 span { color: var(--accent); }
    .byline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .byline strong { color: var(--accent); }

    header .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Search in header */
    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 34px;
      font-size: 0.82rem;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      width: 200px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      width: 260px;
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* ---- Layout ---- */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ---- New Note Form ---- */
    .new-note-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 36px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .new-note-box:focus-within {
      box-shadow: 0 4px 24px rgba(192,57,43,0.12);
      border-color: #d9a9a4;
    }
    .new-note-box input[type="text"] {
      width: 100%;
      border: none;
      outline: none;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      background: transparent;
      margin-bottom: 10px;
    }
    .new-note-box input[type="text"]::placeholder { color: var(--muted); }
    .new-note-box textarea {
      width: 100%;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: transparent;
      resize: none;
      min-height: 80px;
      line-height: 1.6;
    }
    .new-note-box textarea::placeholder { color: var(--muted); }
    .form-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .color-picker {
      display: flex;
      gap: 8px;
    }
    .color-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-dot:hover, .color-dot.active {
      transform: scale(1.25);
      border-color: var(--text);
    }
    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: #a93226; transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* ---- Filters ---- */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters span {
      font-size: 0.75rem;
      color: var(--muted);
      margin-right: 4px;
    }
    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ---- Notes Grid ---- */
    .notes-grid {
      columns: 3;
      column-gap: 16px;
    }
    @media (max-width: 768px) { .notes-grid { columns: 2; } }
    @media (max-width: 480px) { .notes-grid { columns: 1; } }

    .note-card {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      animation: popIn 0.3s ease forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .note-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .note-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-accent, var(--accent));
      border-radius: 14px 14px 0 0;
    }

    .note-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      word-break: break-word;
    }
    .note-body {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .note-meta {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .note-date {
      font-size: 0.68rem;
      color: #bbb;
    }
    .note-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .note-card:hover .note-actions { opacity: 1; }
    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
      color: var(--muted);
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .action-btn.delete:hover { border-color: #e74c3c; color: #e74c3c; background: #fdf0ee; }

    /* Pinned note */
    .note-card.pinned::after {
      content: '📌';
      position: absolute;
      top: 10px; right: 10px;
      font-size: 0.75rem;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty p:first-child { font-size: 3rem; margin-bottom: 12px; }
    .empty p:last-child { font-size: 0.85rem; }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .stats strong { color: var(--text); }

    /* Edit modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 28px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--text);
    }
    .modal input, .modal textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal textarea { min-height: 120px; resize: vertical; }
    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .cancel-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      transition: all 0.15s;
    }
    .cancel-btn:hover { border-color: var(--muted); color: var(--text); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
    }
    footer strong { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Note<span>ly</span></h1>
    <span class="byline">by <strong>Yukta Taneja</strong></span>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search notes..." oninput="renderNotes()" />
    </div>
  </div>
</header>

<div class="container">
  <!-- New Note -->
  <div class="new-note-box" id="newNoteBox">
    <input type="text" id="newTitle" placeholder="Title" maxlength="80" />
    <textarea id="newBody" placeholder="Take a note..." rows="3"></textarea>
    <div class="form-bottom">
      <div class="color-picker" id="colorPicker">
        <div class="color-dot active" data-color="#c0392b" style="background:#c0392b" onclick="selectColor(this)"></div>
        <div class="color-dot" data-color="#2980b9" style="background:#2980b9" onclick="selectColor(this)"></div>
        <div class="color-dot" data-color="#27ae60" style="background:#27ae60" onclick="selectColor(this)"></div>
        <div class="color-dot" data-color="#8e44ad" style="background:#8e44ad" onclick="selectColor(this)"></div>
        <div class="color-dot" data-color="#e67e22" style="background:#e67e22" onclick="selectColor(this)"></div>
        <div class="color-dot" data-color="#16a085" style="background:#16a085" onclick="selectColor(this)"></div>
      </div>
      <button class="add-btn" onclick="addNote()">+ Add Note</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span>Show:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pinned', this)">📌 Pinned</button>
    <button class="filter-btn" onclick="setFilter('recent', this)">🕐 Recent</button>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Notes Grid -->
  <div class="notes-grid" id="notesGrid"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3>✏️ Edit Note</h3>
    <input type="text" id="editTitle" placeholder="Title" maxlength="80" />
    <textarea id="editBody" placeholder="Note content..."></textarea>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
      <button class="add-btn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<footer>
  Built with ♥ by <strong>Yukta Taneja</strong> · Your notes are saved in the browser
</footer>

<script>
  let notes = JSON.parse(localStorage.getItem('notely_yt') || '[]');
  let selectedColor = '#c0392b';
  let currentFilter = 'all';
  let editingId = null;

  function save() {
    localStorage.setItem('notely_yt', JSON.stringify(notes));
  }

  function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
    selectedColor = el.dataset.color;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderNotes();
  }

  function addNote() {
    const title = document.getElementById('newTitle').value.trim();
    const body  = document.getElementById('newBody').value.trim();
    if (!title && !body) {
      document.getElementById('newTitle').focus();
      return;
    }
    const note = {
      id: Date.now(),
      title: title || 'Untitled',
      body,
      color: selectedColor,
      pinned: false,
      createdAt: new Date().toISOString()
    };
    notes.unshift(note);
    save();
    document.getElementById('newTitle').value = '';
    document.getElementById('newBody').value = '';
    renderNotes();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    save();
    renderNotes();
  }

  function togglePin(id) {
    const note = notes.find(n => n.id === id);
    if (note) note.pinned = !note.pinned;
    save();
    renderNotes();
  }

  function openEdit(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    editingId = id;
    document.getElementById('editTitle').value = note.title;
    document.getElementById('editBody').value = note.body;
    document.getElementById('editModal').style.display = 'flex';
  }

  function saveEdit() {
    const note = notes.find(n => n.id === editingId);
    if (!note) return;
    note.title = document.getElementById('editTitle').value.trim() || 'Untitled';
    note.body  = document.getElementById('editBody').value.trim();
    save();
    closeEditModal();
    renderNotes();
  }

  function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    editingId = null;
  }

  function closeModal(e) {
    if (e.target.classList.contains('modal-overlay')) closeEditModal();
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function renderNotes() {
    const query  = document.getElementById('searchInput').value.toLowerCase();
    let filtered = [...notes];

    // Search
    if (query) {
      filtered = filtered.filter(n =>
        n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query)
      );
    }

    // Filter
    if (currentFilter === 'pinned') filtered = filtered.filter(n => n.pinned);
    if (currentFilter === 'recent') {
      const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
      filtered = filtered.filter(n => new Date(n.createdAt).getTime() > cutoff);
    }

    // Pinned first
    filtered.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

    // Stats
    document.getElementById('stats').innerHTML = `
      <span><strong>${notes.length}</strong> total notes</span>
      <span><strong>${notes.filter(n=>n.pinned).length}</strong> pinned</span>
      ${query ? `<span>Showing <strong>${filtered.length}</strong> match${filtered.length !== 1 ? 'es' : ''}</span>` : ''}
    `;

    const grid = document.getElementById('notesGrid');
    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <p>📝</p>
          <p>${query ? 'No notes match your search.' : 'No notes yet — add your first one above!'}</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(note => `
      <div class="note-card ${note.pinned ? 'pinned' : ''}" style="--card-accent:${note.color}; background: ${note.color}10;">
        <div class="note-title">${escHtml(note.title)}</div>
        ${note.body ? `<div class="note-body">${escHtml(note.body)}</div>` : ''}
        <div class="note-meta">
          <span class="note-date">${formatDate(note.createdAt)}</span>
          <div class="note-actions">
            <button class="action-btn" onclick="togglePin(${note.id})" title="${note.pinned ? 'Unpin' : 'Pin'}">
              ${note.pinned ? '📌' : '📍'}
            </button>
            <button class="action-btn" onclick="openEdit(${note.id})" title="Edit">✏️</button>
            <button class="action-btn delete" onclick="deleteNote(${note.id})" title="Delete">🗑️</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  // Enter to add note (Ctrl+Enter in textarea)
  document.getElementById('newTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addNote(); }
  });
  document.getElementById('newBody').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) addNote();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeEditModal();
  });

  // Seed a welcome note if empty
  if (notes.length === 0) {
    notes = [{
      id: Date.now(),
      title: 'Welcome to Notely! 👋',
      body: 'This is your personal notes app.\n• Click + Add Note to create notes\n• Pin important ones\n• Search anytime from the header',
      color: '#c0392b',
      pinned: true,
      createdAt: new Date().toISOString()
    }];
    save();
  }

  renderNotes();
</script>
</body>
</html>
